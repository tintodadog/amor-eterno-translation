<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Title</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #222;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
      font-size: 1.2em;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #666;
    }

    .lyrics {
      margin-top: 15px;
    }

    .es {
      color: #444;
    }

    .en {
      color: #000;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .line {
      margin: 2px 0;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8em;
      color: #888;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1>Song Title</h1>
  <p style="text-align:center; color:#666;">Artist Name</p>

  <div class="lyrics">

    <h2>Verse 1</h2>

    <div class="line es">Línea uno en español</div>
    <div class="line en">Line one in English</div>

    <div class="line es">Línea dos en español</div>
    <div class="line en">Line two in English</div>


    <h2>Chorus</h2>

    <div class="line es">Línea del coro en español</div>
    <div class="line en">Chorus line in English</div>

    <div class="line es">Otra línea del coro</div>
    <div class="line en">Another chorus line</div>


  </div>

  <footer>
    Translation for educational purposes
  </footer>

</body>
</html>
